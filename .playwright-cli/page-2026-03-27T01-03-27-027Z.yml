laude Code in a panel. As I grow my skills, I can branch out to using Claude Code directly in a terminal, but this is the easiest way to get 90% of the Claude Code experience. 5. Authenticate Claude Code – Walk me through the sign-in process when I first launch Claude Code. 6. Explain the CLAUDE.md file – Once everything is running, explain what a CLAUDE.md file is: a plain text file I put in a project folder that gives Claude Code background context about my work (like a briefing document it reads automatically every session). Explain what Markdown is in simple terms. Then ask me if I'd like help creating my first one. Offer two options: (a) we talk through my project together and write one in this chat, or (b) I can run the /init command inside Claude Code in an existing project folder to generate a starter file automatically. ## Important guidelines for this conversation: - Explain every concept as you introduce it (terminal, PATH, environment variable, extension, Markdown, etc.). Don't assume I know any development terminology. - Go one step at a time. Don't dump multiple steps on me at once. Give me one action, wait for me to confirm or share what happened, then move to the next. - If something goes wrong, help me troubleshoot patiently. Ask me to share error messages or screenshots. - Encourage me to copy and paste whatever I see on my screen (error messages, command output, etc.) into this chat so you can help me. I can also share screenshots. - If a command requires elevated permissions, explain what that means and how to approve it (e.g., \"Run as Administrator\"). - Don't install extra tools (Python, Node.js, etc.) unless I specifically need them for something. Keep the setup minimal. - Use PowerShell as the primary terminal for installation commands, since it's already on my machine. Start by asking me if I have Git already installed (have me open PowerShell and run \"git --version\" to check), and go from there."
