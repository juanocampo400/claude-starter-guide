          - text: A model is a
          - strong [ref=e89]: neural network
          - text: that has been trained on massive amounts of text. Training is what gives the model everything it knows. Once training ends, the model is
          - strong [ref=e91]: locked
          - text: permanently. The model you use is the same model everyone else uses. It does not learn from your conversations, carry memories between sessions, or improve the more you use it. What you can change is the context you give it in each conversation.
