        - paragraph [ref=e139]:
          - text: Every conversation with Claude happens inside a
          - strong [ref=e141]: context window
          - text: – a fixed-size container that holds your messages, Claude's replies, uploaded files, and any background instructions, all at once. When the window fills up, older content is dropped and the model has no way to retrieve it. As tokens pile up, costs rise and performance degrades (sometimes called "context rot"). The practical insight is that
          - strong [ref=e143]: system prompts
          - text: ", CLAUDE.md files, and project instructions are not magic features – they are simply text loaded into the window before you type your first message. There are several ways to get information in, from simple copy-paste to file uploads to automated"
