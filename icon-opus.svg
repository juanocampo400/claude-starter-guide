<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Layered neural network: 2-3-3-1 -->
  <!-- Connections: input to hidden1 (2x3 = 6 lines) -->
  <line x1="24" y1="12" x2="18" y2="22" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="12" x2="32" y2="22" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="12" x2="46" y2="22" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="12" x2="18" y2="22" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="12" x2="32" y2="22" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="12" x2="46" y2="22" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <!-- Connections: hidden1 to hidden2 (3x3 = 9 lines) -->
  <line x1="18" y1="22" x2="18" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="18" y1="22" x2="32" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="18" y1="22" x2="46" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="22" x2="18" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="22" x2="32" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="22" x2="46" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="46" y1="22" x2="18" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="46" y1="22" x2="32" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="46" y1="22" x2="46" y2="34" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <!-- Connections: hidden2 to output (3x1 = 3 lines) -->
  <line x1="18" y1="34" x2="32" y2="44" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="34" x2="32" y2="44" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <line x1="46" y1="34" x2="32" y2="44" stroke="#D97757" stroke-width="1" opacity="0.4"/>
  <!-- Input layer -->
  <circle cx="24" cy="12" r="2.5" fill="#D97757"/>
  <circle cx="40" cy="12" r="2.5" fill="#D97757"/>
  <!-- Hidden layer 1 -->
  <circle cx="18" cy="22" r="2.5" fill="#D97757"/>
  <circle cx="32" cy="22" r="2.5" fill="#D97757"/>
  <circle cx="46" cy="22" r="2.5" fill="#D97757"/>
  <!-- Hidden layer 2 -->
  <circle cx="18" cy="34" r="2.5" fill="#D97757"/>
  <circle cx="32" cy="34" r="2.5" fill="#D97757"/>
  <circle cx="46" cy="34" r="2.5" fill="#D97757"/>
  <!-- Output layer -->
  <circle cx="32" cy="44" r="2.5" fill="#D97757"/>
</svg>
