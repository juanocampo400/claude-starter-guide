<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs/>
  <!-- Parameters: padding=40, neuronRadius=8, color=#d97757 -->
  <!-- Positions follow special alignment: outer 2-neuron layers placed in gaps of middle 3-neuron layer -->
  <!-- Connections -->
  <!-- From left layer (x=40, y between middle gaps) to middle layer (x=100) -->
  <line x1="40" y1="76.667" x2="100" y2="40" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>
  <line x1="40" y1="76.667" x2="100" y2="100" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>
  <line x1="40" y1="76.667" x2="100" y2="160" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>

  <line x1="40" y1="123.333" x2="100" y2="40" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>
  <line x1="40" y1="123.333" x2="100" y2="100" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>
  <line x1="40" y1="123.333" x2="100" y2="160" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>

  <!-- From middle to right (x=160) -->
  <line x1="100" y1="40" x2="160" y2="76.667" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="100" x2="160" y2="76.667" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="160" x2="160" y2="76.667" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>

  <line x1="100" y1="40" x2="160" y2="123.333" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="100" x2="160" y2="123.333" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>
  <line x1="100" y1="160" x2="160" y2="123.333" stroke="#d97757" stroke-width="1.5" opacity="0.3"/>

  <!-- Neurons -->
  <!-- Left layer (2 neurons) at x=40, y = midpoints between middle layer neurons -> 76.667 and 123.333 -->
  <circle cx="40" cy="76.667" r="8" fill="#d97757" stroke="#d97757" stroke-width="2"/>
  <circle cx="40" cy="123.333" r="8" fill="#d97757" stroke="#d97757" stroke-width="2"/>

  <!-- Middle layer (3 neurons) at x=100, y = 40,100,160 -->
  <circle cx="100" cy="40" r="8" fill="#d97757" stroke="#d97757" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="#d97757" stroke="#d97757" stroke-width="2"/>
  <circle cx="100" cy="160" r="8" fill="#d97757" stroke="#d97757" stroke-width="2"/>

  <!-- Right layer (2 neurons) at x=160, y = 76.667 and 123.333 -->
  <circle cx="160" cy="76.667" r="8" fill="#d97757" stroke="#d97757" stroke-width="2"/>
  <circle cx="160" cy="123.333" r="8" fill="#d97757" stroke="#d97757" stroke-width="2"/>
</svg>