<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Layered neural network: 2-3-1 -->
  <!-- Connections: input to hidden (2x3 = 6 lines) -->
  <line x1="24" y1="14" x2="18" y2="28" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="14" x2="32" y2="28" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="14" x2="46" y2="28" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="14" x2="18" y2="28" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="14" x2="32" y2="28" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="14" x2="46" y2="28" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <!-- Connections: hidden to output (3x1 = 3 lines) -->
  <line x1="18" y1="28" x2="32" y2="42" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="28" x2="32" y2="42" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="46" y1="28" x2="32" y2="42" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <!-- Input layer -->
  <circle cx="24" cy="14" r="2.5" fill="#D97757"/>
  <circle cx="40" cy="14" r="2.5" fill="#D97757"/>
  <!-- Hidden layer -->
  <circle cx="18" cy="28" r="2.5" fill="#D97757"/>
  <circle cx="32" cy="28" r="2.5" fill="#D97757"/>
  <circle cx="46" cy="28" r="2.5" fill="#D97757"/>
  <!-- Output layer -->
  <circle cx="32" cy="42" r="2.5" fill="#D97757"/>
</svg>
