<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Layered neural network: 1-2-1 -->
  <!-- Connections: input to hidden -->
  <line x1="32" y1="16" x2="24" y2="28" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="16" x2="40" y2="28" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <!-- Connections: hidden to output -->
  <line x1="24" y1="28" x2="32" y2="40" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="28" x2="32" y2="40" stroke="#D97757" stroke-width="1" opacity="0.5"/>
  <!-- Input layer -->
  <circle cx="32" cy="16" r="3" fill="#D97757"/>
  <!-- Hidden layer -->
  <circle cx="24" cy="28" r="3" fill="#D97757"/>
  <circle cx="40" cy="28" r="3" fill="#D97757"/>
  <!-- Output layer -->
  <circle cx="32" cy="40" r="3" fill="#D97757"/>
</svg>
